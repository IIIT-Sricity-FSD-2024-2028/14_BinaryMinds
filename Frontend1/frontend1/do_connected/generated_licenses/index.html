<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generated Licenses - TradeZo</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="../session_guard.js"></script>
</head>
<body>

<!-- ===== TOP HEADER ===== -->
<div class="top-header">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="India Logo">
    <div class="header-text">
      Government of India
      <span>TradeZo</span>
    </div>
  </div>
  <button class="logout-btn">Logout</button>
</div>

<!-- ===== MAIN LAYOUT ===== -->
<div class="container">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Worklist</div>
    <div class="nav-item">Final Authorization</div>
    <div class="nav-item">Reports</div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">

    <!-- Title -->
    <div class="topbar">
      <h2>Generated Licenses Log</h2>
      <button class="btn-secondary" onclick="window.location.href='../compliance/index.html'">← Back to Reports</button>
    </div>

    <div class="card">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by Business Name, License ID..." />
      </div>

      <table class="data-table" id="licensesTable">
        <thead>
          <tr>
            <th>Application ID</th>
            <th>License Number</th>
            <th>Business / Applicant Name</th>
            <th>Category</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamically populated -->
        </tbody>
      </table>
      
      <div class="pagination">
        <span id="countText">Showing 0 licenses</span>
      </div>
    </div>

  </div>
</div>

<script src="../../mockdata.js"></script>
<script src="script.js"></script>
<script src="../do_nav.js"></script>

</body>
</html>
