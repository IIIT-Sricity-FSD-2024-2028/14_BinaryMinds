<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Inspection</title>
    <link rel="stylesheet" href="style.css">
<script src="../session_guard.js"></script>
</head>
<body>

<!-- 🔷 Top Header -->
<header class="top-header">
    <div class="logo-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="emblem" class="emblem" height="45">
        <div>
            <h4>Government of India</h4>
            <h2>TradeZo</h2>
        </div>
    </div>

    <div class="header-right">
        <div class="user-info">
            <span>Welcome</span>
            <b>Myra</b>
        </div>

        <div class="header-icons">
            <img src="../assets/icons/bell.png" class="header-icon">
            <span class="dot"></span>
            <img src="../assets/icons/logout.png" class="header-icon" onclick="foLogout()" style="cursor:pointer" title="Logout">
        </div>
    </div>
</header>

<!-- 🔷 Layout -->
<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <ul>
            <li>
                <img src="../assets/icons/db.png" class="icon">
                <span>Dashboard</span>
            </li>

            <li>
                <img src="../assets/icons/verification.png" class="icon">
                <span>Verification</span>
            </li>

            <li class="active">
                <img src="../assets/icons/inspection.png" class="icon">
                <span>Record Inspection</span>
            </li>

            <li>
                <img src="../assets/icons/verification-history.png" class="icon">
                <span>Verification History</span>
            </li>

            <li>
                <img src="../assets/icons/inspection-history.png" class="icon">
                <span>Inspection History</span>
            </li>

            <li>
                <img src="../assets/icons/profile.png" class="icon">
                <span>Profile</span>
            </li>
        </ul>
    </aside>

    <!-- Content -->
    <main class="content">

        <h1>Record Inspection</h1>
        <p class="subtitle">Manage and conduct scheduled field inspections.</p>

        <!-- Search -->
        <div class="search-box">
            <img src="../assets/icons/search.png" class="search-icon">
            <input type="text" id="searchInspection" placeholder="Search by business name...">
        </div>

        <p id="countText">Showing 3 inspection(s)</p>

        <!-- Cards -->
        <div class="cards-container" id="inspectionCards">

            
            <!-- Cards loaded dynamically by ri.js -->
        

        </div>

    </main>
</div>

<script src="../../mockdata.js"></script>
<script src="ri.js"></script>
<script src="../fo_nav.js"></script>
</body>
</html>
