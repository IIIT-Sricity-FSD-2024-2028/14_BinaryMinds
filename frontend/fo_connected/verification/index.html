<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Officer Verification</title>
    <link rel="stylesheet" href="style.css">
    <script src="../session_guard.js"></script>
</head>
<body>

<!-- 🔷 Top Header -->
<header class="top-header">
    <div class="logo-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" class="emblem" height="45">
        <div>
            <h4>Government of India</h4>
            <h2>TradeZo</h2>
        </div>
    </div>

    <div class="header-right">
        <div class="user-info">
            <span>Welcome</span>
            <b>Myra</b>
        </div>

        <div class="header-icons">
<img src="../assets/icons/logout.png" class="header-icon" onclick="foLogout()" style="cursor:pointer">
        </div>
    </div>
</header>

<!-- 🔷 Main Layout -->
<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <ul>
            <li>
                <img src="../assets/icons/db.png" class="icon">
                Dashboard
            </li>

            <li class="active">
                <img src="../assets/icons/verification.png" class="icon">
                Verification
            </li>

            <li>
                <img src="../assets/icons/inspection.png" class="icon">
                Record Inspection
            </li>

            <li>
                <img src="../assets/icons/verification-history.png" class="icon">
                Verification History
            </li>

            <li>
                <img src="../assets/icons/inspection-history.png" class="icon">
                Inspection History
            </li>

            <li>
                <img src="../assets/icons/profile.png" class="icon">
                Profile
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <div class="main">
        <h2>Verification</h2>
        <p class="subtitle">Review and verify submitted trade license applications.</p>

        <!-- Search -->
        <div class="search-bar">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchCards()">
        </div>

        <p class="count" id="countText"></p>

        <!-- 🔥 DYNAMIC CARDS WILL COME HERE -->
        <div class="cards-grid" id="verificationList"></div>

    </div>
</div>

<script src="../fo_nav.js?v=officer-specific-dashboard-20260504"></script>

<!-- 🔥 SCRIPT FOR DYNAMIC DATA -->
<script>
function loadVerificationApps() {
    let applications = JSON.parse(localStorage.getItem("applications")) || [];
    let centralApplications = (window.TRADEZO && TRADEZO.applications) ? TRADEZO.applications : [];
    applications = centralApplications.concat(applications);

    let container = document.getElementById("verificationList");
    container.innerHTML = "";

    let seen = {};
    let pendingApps = applications.filter(app => {
        let id = app.id || app.appRef || "";
        if (!id || seen[id]) return false;
        seen[id] = true;
        return app.applicantName &&
            app.applicantName.trim() !== "" &&
            (app.status === "Pending" || app.status === "Under Verification" || app.status === "Pending Review") &&
            (!window.foIsAssignedToCurrentOfficer || window.foIsAssignedToCurrentOfficer(app));
    });
    
    if (pendingApps.length === 0) {
        container.innerHTML = "<p>No pending applications for verification.</p>";
        document.getElementById("countText").innerText = "0 applications";
        return;
    }
    
    pendingApps.forEach(app => {
        let card = `
            <div class="card">
                <div class="card-top"></div>
                <div class="card-body">
                    <h3>${app.applicantName || ""}</h3>
                    <p class="app-id">${app.id || ""}</p>
                    <p>Business: ${app.businessName || ""}</p>
                    <p>Type: ${app.licenseType || ""}</p>
                    <p>Date: ${app.submittedDate || ""}</p>
                    <p>Status: ${app.status || ""}</p>

                    <button onclick="viewDetails('${app.id}')">View Details</button>
                    <button onclick="rejectApp('${app.id}')">Reject</button>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });

    document.getElementById("countText").innerText = pendingApps.length + " application(s)";
}

function viewDetails(id) {
    sessionStorage.setItem('selectedApp', id);
    window.location.href = "../detail/index.html";
}

function rejectApp(id) {
    let applications = JSON.parse(localStorage.getItem("applications")) || [];

    applications = applications.map(app => {
        if (app.id === id) app.status = "Rejected";
        return app;
    });

    localStorage.setItem("applications", JSON.stringify(applications));
    loadVerificationApps();
}

function searchCards() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(input) ? "block" : "none";
    });
}

document.addEventListener('DOMContentLoaded', loadVerificationApps);
</script>

</body>
</html>
