<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeZo - Application Worklist</title>
  <link rel="stylesheet" href="style.css" />
<script src="../session_guard.js"></script>
</head>
<body>

<!-- ===== TOP HEADER ===== -->
<div class="top-header">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="India Logo">
    <div class="header-text">
      Government of India
      <span>TradeZo</span>
    </div>
  </div>
  <button class="logout-btn">Logout</button>
</div>

<!-- ===== MAIN LAYOUT ===== -->
<div class="container">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="nav-item">Dashboard</div>
    <div class="nav-item active">Worklist</div>
    <div class="nav-item">Final Authorization</div>
    <div class="nav-item">Reports</div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">

    <!-- Title -->
    <div class="topbar">
      <h2>Application Worklist</h2>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active">All Applications</button>
      <button class="filter-btn">Urgent</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" placeholder="Search by Application ID, Company Name, or Tax ID" />
    </div>

    <!-- Table -->
    <table class="table">
      <thead>
        <tr>
          <th>App ID</th>
          <th>Company Name</th>
          <th>Submission Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination">
      <span>Showing 1 to 5 of 5 applications</span>
      <div class="page-controls">
        <button>&lt;</button>
        <button>&gt;</button>
      </div>
    </div>

  </div>
</div>

<script src="../../mockdata.js"></script>
<script src="script.js"></script>
<script src="../do_nav.js"></script>
</body>
</html>
