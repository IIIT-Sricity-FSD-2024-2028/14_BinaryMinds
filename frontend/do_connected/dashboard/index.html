<!DOCTYPE html>
<html>
<head>
<script src="../../../mockdata.js"></script>
<script src="../session_guard.js"></script>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ===== TOP HEADER ===== -->
<div class="top-header">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="India Logo">
    <div class="header-text">
      Government of India
      <span>TradeZo</span>
    </div>
  </div>

  <button class="logout-btn">Logout</button>
</div>

<!-- ===== MAIN LAYOUT ===== -->
<div class="container">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Worklist</div>
    <div class="nav-item">Final Authorization</div>
    <div class="nav-item">Reports</div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">

    <!-- Title -->
    <div class="topbar">
      <h2>Department Officer Dashboard</h2>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <p>Pending Applications</p>
        <h2>1,284</h2>
      </div>

      <div class="card">
        <p>Licenses Issued</p>
        <h2>45,920</h2>
      </div>

      <div class="card">
        <p>SLA Compliance</p>
        <h2>132 / 142</h2>
      </div>
    </div>

<!-- Chart -->
    <div class="chart-box">
      <h3>Weekly Application Volume</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<!-- ===== JS ===== -->
<script src="script.js"></script>

<script src="../do_nav.js"></script>


</body>
</html>
